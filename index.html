<style>

/* ================= ROOT ================= */

:root{
    --bg-color:#121212;
    --text-color:#ffffff;
    --card-bg:#1c1c1c;
    --accent:#00c3ff;
    --shadow:rgba(0,0,0,0.5);
}

[data-theme="light"]{
    --bg-color:#f4f4f9;
    --text-color:#121212;
    --card-bg:#ffffff;
    --accent:#007bff;
    --shadow:rgba(0,0,0,0.1);
}

*{
    box-sizing:border-box;
    transition:background-color .3s,color .3s;
}

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    background:var(--bg-color);
    color:var(--text-color);
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* ================= THEME BUTTON ================= */

.theme-btn{
    position:fixed;
    top:15px;
    left:15px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    z-index:999;
    font-weight:bold;
    box-shadow:0 4px 12px var(--shadow);
}

/* ================= BANNER ================= */

.banner{
    width:100%;
    height:420px;
    background:url('https://i.ibb.co/zV7ncMQS/Gemini-Generated-Image-glsuslglsuslglsu-copy.png') center center/cover no-repeat;
}

/* ================= DOWNLOAD SECTION ================= */

.download-section{
    text-align:center;
    padding:45px 20px;
}

.download-section h2{
    font-size:30px;
    margin-bottom:20px;
}

.download-btn img{
    width:100%;
    max-width:320px;
    border-radius:16px;
    box-shadow:0 6px 20px var(--shadow);
    transition:.25s;
}

.download-btn img:hover{
    transform:scale(1.03);
}

/* ================= SLIDER ================= */

.slider-container{
    margin-top:20px;
}

.slider-container h2{
    padding:0 42px;
    margin-bottom:18px;
}

.slider-wrapper{
    position:relative;
    width:100%;
    overflow:hidden;
    padding:10px 42px;
}

.slider{
    display:flex;
    gap:14px;
    overflow-x:auto;
    scroll-behavior:smooth;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
}

.slider::-webkit-scrollbar{
    display:none;
}

/* CARD */

.card{
    min-width:250px;
    width:250px;
    height:250px;
    border-radius:18px;
    overflow:hidden;
    flex-shrink:0;
    cursor:pointer;
    background:var(--card-bg);
    box-shadow:0 4px 12px var(--shadow);
    border:1px solid rgba(255,255,255,.05);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.25s;
}

.card:hover img{
    transform:scale(1.04);
}

/* ARROWS */

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    z-index:5;
    box-shadow:0 4px 10px var(--shadow);
}

.left{
    right:4px;
}

.right{
    left:4px;
}

/* ================= SERVICES ================= */

.services-section{
    padding:70px 20px;
    text-align:center;
}

.services-section h2{
    margin-bottom:35px;
}

.services-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    max-width:950px;
    margin:auto;
}

.service-box{
    background:var(--card-bg);
    padding:30px;
    border-radius:18px;
    box-shadow:0 6px 20px var(--shadow);
    border:1px solid rgba(255,255,255,.06);
}

.service-box h3{
    margin-top:0;
    color:var(--accent);
    line-height:1.7;
}

.service-price{
    font-size:28px;
    font-weight:bold;
    margin:18px 0;
}

.service-price span{
    display:block;
    font-size:16px;
    color:gray;
    margin-top:5px;
}

.service-btn{
    display:inline-block;
    width:100%;
    padding:14px;
    border-radius:12px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

/* ================= VIDEO ================= */

.video-section{
    text-align:center;
    padding:30px 20px 90px;
}

.video-section h2{
    margin-bottom:30px;
}

.video-wrapper{
    width:100%;
    max-width:360px;
    height:640px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 25px var(--shadow);
}

.video-wrapper iframe{
    width:100%;
    height:100%;
    border:none;
}

/* ================= ADS CONTAINER ================= */
.ad-container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 30px 0;
    overflow: hidden;
}

/* ================= MOBILE ================= */

@media(max-width:700px){

.banner{
    height:220px;
}

.download-section h2{
    font-size:24px;
}

.slider-wrapper{
    padding:8px 38px;
}

.card{
    min-width:220px;
    width:220px;
    height:220px;
}

.arrow{
    width:32px;
    height:32px;
    font-size:15px;
}

.video-wrapper{
    max-width:100%;
    height:520px;
}

.services-grid{
    grid-template-columns:1fr;
}

}

</style>
